name: Publish Version

on:
  workflow_call:
    inputs:
      simulate:
        required: false
        type: boolean
        default: false
      tag-name:
        description: Tag to build from and upload to
        required: true
        type: string
      version:
        description: Version branch identifier
        required: true
        type: string
      release-body:
        description: Body for published release notes
        required: false
        type: string
      changelog-body:
        description: Body of change notes to insert into CHANGELOG.md
        required: false
        type: string

jobs:
  build:
    name: Build and Publish to Maven
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CI: 'true'
    outputs:
      ver: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}
      - name: Setup Build
        uses: ./.github/actions/build_setup
        with:
          ref: ${{ inputs.version }}
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Get Version
        id: ver
        run: echo "version=$(./gradlew -q printVersion 2>/dev/null || echo $(grep -oP 'mod_version\s*=\s*\K.*' gradle.properties))" >> $GITHUB_OUTPUT
      - name: Build
        run: ./gradlew assemble
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ inputs.tag-name }}
          path: build/libs/*
          if-no-files-found: error
          retention-days: 3
      - name: Publish
        if: ${{ !inputs.simulate }}
        env:
          MAVEN_USER: ${{ secrets.MAVEN_USER }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
        run: ./gradlew publish -x buildNative -x test

  upload-release-artifacts:
    name: Upload Artifacts
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ inputs.tag-name }}
      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag-name }}
          files: ./*.jar
          fail_on_unmatched_files: true

  bump-version-and-changelog:
    name: Bump Version and Update Changelog
    needs: [build, upload-release-artifacts]
    if: ${{ always() && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}
      - name: Bump Version
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git switch -C gh/release-${{ inputs.version }}
          CURRENT=$(grep -oP 'mod_version\s*=\s*\K.*' gradle.properties | tail -1)
          BUMPED=$(echo $CURRENT | awk -F. '/[0-9]+\./{$NF++;print}' OFS=.)
          sed -i "s/mod_version\s*=\s*$CURRENT/mod_version = $BUMPED/" gradle.properties
          git add gradle.properties
          git commit -m "Bump version to $BUMPED" || true
      - name: Prepend to CHANGELOG
        if: inputs.changelog-body
        run: |
          { head -n 2 CHANGELOG.md; echo -e "${{ inputs.changelog-body }}"; tail -n +3 CHANGELOG.md; } > temp.md && mv temp.md CHANGELOG.md
          git add CHANGELOG.md
          git commit -m "Update CHANGELOG for ${{ needs.build.outputs.ver }}" || true
      - name: Push and Create PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git push --force --set-upstream origin gh/release-${{ inputs.version }}
          gh pr create \
            -B ${{ inputs.version }} \
            -H gh/release-${{ inputs.version }} \
            --title "Post-release: bump version and update changelog" \
            --body "Automated after release ${{ needs.build.outputs.ver }}" \
            --label "ignore changelog"

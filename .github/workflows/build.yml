name: Build

on:
  pull_request:
    branches: [main, 26.1]
    types: [opened, synchronize, reopened, labeled]

jobs:
  check-skip:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ contains(github.event.pull_request.labels.*.name, 'ci:skip') }}
      full: ${{ contains(github.event.pull_request.labels.*.name, 'ci:native') }}
      android: ${{ contains(github.event.pull_request.labels.*.name, 'ci:android') }}
    steps:
      - run: |
          echo "skip=${{ contains(github.event.pull_request.labels.*.name, 'ci:skip') }}"
          echo "full=${{ contains(github.event.pull_request.labels.*.name, 'ci:native') }}"
          echo "android=${{ contains(github.event.pull_request.labels.*.name, 'ci:android') }}"

  linux-quick:
    needs: check-skip
    if: needs.check-skip.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - run: |
          sudo apt-get update
          sudo apt-get install -y cmake
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew
      - run: ./gradlew build -x buildNative -x test
        shell: bash
      - run: ./gradlew spotlessCheck
        shell: bash

  native-full:
    needs: check-skip
    if: needs.check-skip.outputs.skip != 'true' && needs.check-skip.outputs.full == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            label: linux-x86-64
          - os: ubuntu-24.04-arm
            arch: aarch64
            label: linux-aarch64
          - os: macos-14
            arch: x86_64
            label: macos-x86-64
          - os: macos-latest
            arch: aarch64
            label: macos-aarch64
          - os: windows-latest
            arch: x86_64
            label: windows-x86-64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgmp-dev libmpfr-dev cmake

      - name: Install macOS deps
        if: runner.os == 'macOS'
        run: |
          brew install gmp mpfr cmake

      - name: Install Windows deps
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg install --triplet x64-windows
          echo "CMAKE_PREFIX_PATH=$env:VCPKG_ROOT\installed\x64-windows" >> $env:GITHUB_ENV

      - uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew build -x test -Dbigmath.native.classifier=${{ matrix.label }}
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: native-libs-${{ matrix.label }}
          path: build/native/resources/**

  android-build:
    needs: check-skip
    if: needs.check-skip.outputs.skip != 'true' && needs.check-skip.outputs.android == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            label: android-aarch64
            target: aarch64-linux-android
          - abi: x86_64
            label: android-x86-64
            target: x86_64-linux-android

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28
          add-to-path: false

      - name: Build native for Android
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          mkdir -p build/native
          cmake -S src/main/cpp -B build/native \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-21 \
            -DUSE_GMP=OFF
          cmake --build build/native --target bigmath_ffm -j$(nproc)
          mkdir -p build/native/resources/${{ matrix.label }}
          find build/native -name "*.so" -exec cp {} build/native/resources/${{ matrix.label }}/ \;

      - uses: actions/upload-artifact@v4
        with:
          name: native-libs-${{ matrix.label }}
          path: build/native/resources/**

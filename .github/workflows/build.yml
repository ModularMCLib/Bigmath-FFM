name: Build

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  native-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            label: linux-x86-64
          - os: ubuntu-24.04-arm
            arch: aarch64
            label: linux-aarch64
          - os: macos-13
            arch: x86_64
            label: macos-x86-64
          - os: macos-latest
            arch: aarch64
            label: macos-aarch64
          - os: windows-latest
            arch: x86_64
            label: windows-x86-64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Install Linux x86_64 deps
        if: runner.os == 'Linux' && matrix.arch == 'x86_64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgmp-dev libmpfr-dev cmake

      - name: Install Linux aarch64 deps
        if: runner.os == 'Linux' && matrix.arch == 'aarch64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgmp-dev:arm64 libmpfr-dev:arm64 cmake

      - name: Install macOS deps
        if: runner.os == 'macOS'
        run: |
          brew install gmp mpfr cmake

      - name: Install Windows deps
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg install --triplet x64-windows
          echo "CMAKE_PREFIX_PATH=$env:VCPKG_ROOT\installed\x64-windows" >> $env:GITHUB_ENV

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew
        shell: bash

      - name: Build and test
        run: ./gradlew build -Dbigmath.native.classifier=${{ matrix.label }}
        shell: bash

      - name: Upload native libs
        uses: actions/upload-artifact@v4
        with:
          name: native-libs-${{ matrix.label }}
          path: build/native/resources/**

  android-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi:
          - arm64-v8a
          - x86_64
        include:
          - abi: arm64-v8a
            target: aarch64-linux-android
            label: android-aarch64
          - abi: x86_64
            target: x86_64-linux-android
            label: android-x86-64

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28
          add-to-path: false

      - name: Build native for Android
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          TOOLCHAIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64
          export PATH="$TOOLCHAIN/bin:$PATH"
          export CC="$TOOLCHAIN/bin/${{ matrix.target }}$( (("${{ matrix.abi }}" == "arm64-v8a")) && echo 21 || echo 21 )-clang"
          export CXX="$TOOLCHAIN/bin/${{ matrix.target }}$( (("${{ matrix.abi }}" == "arm64-v8a")) && echo 21 || echo 21 )-clang++"
          mkdir -p build/native
          cmake -S src/main/cpp -B build/native \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-21 \
            -DUSE_GMP=OFF
          cmake --build build/native --target bigmath_ffm -j$(nproc)

      - name: Upload Android native libs
        uses: actions/upload-artifact@v4
        with:
          name: native-libs-${{ matrix.label }}
          path: build/native/*.so

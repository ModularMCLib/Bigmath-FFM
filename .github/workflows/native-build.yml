name: Native Build

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

concurrency:
  group: native-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      native: ${{ steps.decide.outputs.native || 'false' }}
      android: ${{ steps.decide.outputs.android || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - name: Decide What to Run
        id: decide
        run: |
          LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'
          SKIP=$(echo "$LABELS" | grep -q 'ci:skip' && echo true || echo false)
          NATIVE=$(echo "$LABELS" | grep -q 'ci:native' && echo true || echo false)
          ANDROID=$(echo "$LABELS" | grep -q 'ci:android' && echo true || echo false)

          if [ "$SKIP" = "true" ]; then
            echo "native=false" >> $GITHUB_OUTPUT
            echo "android=false" >> $GITHUB_OUTPUT
            echo "::notice::ci:skip detected — native build skipped"
            exit 0
          fi

          if [ "$NATIVE" = "true" ] || [ "$ANDROID" = "true" ]; then
            echo "native=$NATIVE" >> $GITHUB_OUTPUT
            echo "android=$ANDROID" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "native=false" >> $GITHUB_OUTPUT
          echo "android=false" >> $GITHUB_OUTPUT

  native-full:
    needs: check
    if: needs.check.outputs.native == 'true'
    env:
      VCPKG_CACHE_KEY_PREFIX: vcpkg-binary-${{ matrix.label }}-${{ hashFiles('vcpkg.json') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86-64
          - os: ubuntu-24.04-arm
            label: linux-aarch64
          - os: macos-14
            label: macos-x86-64
          - os: macos-latest
            label: macos-aarch64
          - os: windows-latest
            label: windows-x86-64
            vcpkg_triplet: x64-mingw-dynamic
          - os: windows-11-arm
            label: windows-aarch64
            vcpkg_triplet: arm64-windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - name: Configure MSVC for Windows ARM64
        if: matrix.vcpkg_triplet == 'arm64-windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64_arm64
      - name: Configure MSVC compiler env
        if: matrix.vcpkg_triplet == 'arm64-windows'
        shell: pwsh
        run: |
          "CC=cl" >> $env:GITHUB_ENV
          "CXX=cl" >> $env:GITHUB_ENV
          "BIGMATH_WINDOWS_COMPILER=msvc" >> $env:GITHUB_ENV
      - name: Configure MinGW for Windows x64
        if: matrix.vcpkg_triplet == 'x64-mingw-dynamic'
        shell: pwsh
        run: |
          $gcc = (Get-Command gcc -ErrorAction Stop).Source
          $gxx = (Get-Command g++ -ErrorAction Stop).Source
          "CC=$gcc" >> $env:GITHUB_ENV
          "CXX=$gxx" >> $env:GITHUB_ENV
          "BIGMATH_WINDOWS_COMPILER=mingw" >> $env:GITHUB_ENV
      - name: Restore vcpkg binary cache
        if: runner.os == 'Windows'
        id: vcpkg-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: .vcpkg-cache
          key: ${{ env.VCPKG_CACHE_KEY_PREFIX }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ${{ env.VCPKG_CACHE_KEY_PREFIX }}-
      - uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgmp-dev libmpfr-dev cmake

      - name: Install macOS deps
        if: runner.os == 'macOS'
        run: brew install gmp mpfr cmake

      - name: Install Windows deps
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/.vcpkg-cache,readwrite
        run: |
          vcpkg install --triplet ${{ matrix.vcpkg_triplet }}
          echo "CMAKE_PREFIX_PATH=${{ github.workspace }}\vcpkg_installed\${{ matrix.vcpkg_triplet }}" >> $env:GITHUB_ENV
          echo "BIGMATH_VCPKG_TRIPLET=${{ matrix.vcpkg_triplet }}" >> $env:GITHUB_ENV

      - uses: gradle/actions/setup-gradle@v4
      - name: Build native
        if: runner.os != 'Windows'
        run: |
          chmod +x gradlew 2>/dev/null || true
          ./gradlew build -x test -Dbigmath.native.classifier=${{ matrix.label }}
        shell: bash
      - name: Build native
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\gradlew.bat --% build -x test -Dbigmath.native.classifier=${{ matrix.label }}

      - name: Save vcpkg binary cache
        if: runner.os == 'Windows' && !cancelled()
        uses: actions/cache/save@v4
        with:
          path: .vcpkg-cache
          key: ${{ steps.vcpkg-cache-restore.outputs.cache-primary-key }}

      - uses: actions/upload-artifact@v4
        with:
          name: native-libs-${{ matrix.label }}
          path: build/generated/local-native/${{ matrix.label }}/**
          retention-days: 7

  android-build:
    needs: check
    if: needs.check.outputs.android == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            label: android-aarch64
            target: aarch64-linux-android
          - abi: x86_64
            label: android-x86-64
            target: x86_64-linux-android

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'

      - name: Setup Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28
          add-to-path: false

      - name: Build native for Android
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          mkdir -p build/native
          cmake -S src/main/cpp -B build/native \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-21 \
            -DUSE_GMP=OFF
          cmake --build build/native --target bigmath_ffm -j$(nproc)
          mkdir -p build/native/resources/${{ matrix.label }}
          find build/native -name "*.so" -exec cp {} build/native/resources/${{ matrix.label }}/ \;

      - uses: actions/upload-artifact@v4
        with:
          name: native-libs-${{ matrix.label }}
          path: build/native/resources/**
          retention-days: 7

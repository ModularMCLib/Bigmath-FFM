name: Publish on Release

on:
  release:
    types: [released]

jobs:
  meta:
    name: Generate Changelog
    runs-on: ubuntu-latest
    outputs:
      CHANGELOG: ${{ steps.changelog.outputs.changelog }}
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Get Config
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          sparse-checkout: '.github/json'
      - name: Generate changelog
        id: changelog
        env:
          GITHUB_TOKEN: ${{ github.token }}
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          configuration: './.github/json/config.json'
          ignorePreReleases: true
          fetchViaCommits: true
          failOnError: false

  publish-26:
    name: Publish 26.1
    needs: [meta]
    if: ${{ contains(github.ref_name, '26.1') }}
    secrets: inherit
    uses: ./.github/workflows/publish.yml
    with:
      simulate: ${{ startsWith(github.event.release.name, 'simulate') || github.repository_owner != 'ModularMCLib' }}
      tag-name: ${{ github.ref_name }}
      version: '26.1'
      release-body: ${{ github.event.release.body }}
      changelog-body: ${{ needs.meta.outputs.CHANGELOG }}

name: Test pull request on push

on:
  pull_request:
    paths: ['**']

concurrency:
  group: PR-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Path Filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - '*.gradle'
              - 'gradle.properties'
              - 'gradlew*'
              - 'gradle/**'
      - name: Install native dependencies
        if: steps.filter.outputs.code == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgmp-dev libmpfr-dev cmake
      - name: Setup Build
        if: steps.filter.outputs.code == 'true'
        uses: ./.github/actions/build_setup
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Run Tests
        if: steps.filter.outputs.code == 'true'
        id: test
        continue-on-error: true
        run: ./gradlew test -PrunTests
      - name: Update "Tests Passed" / "Tests Failed" labels
        if: steps.filter.outputs.code == 'true' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const [add, remove] = {
              success: ['Tests: Passed','Tests: Failed'],
              failure: ['Tests: Failed','Tests: Passed']
            }['${{ steps.test.outcome }}'];

            const { owner, repo }    = context.repo;
            const issue_number       = context.payload.pull_request.number;

            await github.rest.issues
              .addLabels({ owner, repo, issue_number, labels: [add] })
              .catch(() => {});

            await github.rest.issues
              .removeLabel({ owner, repo, issue_number, name: remove })
              .catch(() => {});
      - name: Fail on test failures
        if: steps.filter.outputs.code == 'true' && steps.test.outcome == 'failure'
        run: exit 1

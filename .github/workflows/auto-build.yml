name: Snapshot Release

on:
  push:
    branches: ['main']
    paths: ['src/**', '*.gradle', 'gradle.properties', 'gradle/**', 'settings.gradle']

concurrency:
  group: snapshot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86-64
            lib: libbigmath_ffm.so
          - os: ubuntu-24.04-arm
            label: linux-aarch64
            lib: libbigmath_ffm.so
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y libgmp-dev libmpfr-dev cmake
      - name: Build
        run: |
          mkdir -p build/native native/${{ matrix.label }}
          cmake -S src/main/cpp -B build/native -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=build/native
          cmake --build build/native --target install -j$(nproc)
          cp build/native/lib/${{ matrix.lib }} native/${{ matrix.label }}/
          echo "=== built ==="
          ls -la native/${{ matrix.label }}/
          file native/${{ matrix.label }}/${{ matrix.lib }}
      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.label }}
          path: native/${{ matrix.label }}/${{ matrix.lib }}
          retention-days: 1

  native-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macos-x86-64
            lib: libbigmath_ffm.dylib
          - os: macos-latest
            label: macos-aarch64
            lib: libbigmath_ffm.dylib
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: brew install gmp mpfr cmake
      - name: Build
        run: |
          mkdir -p build/native native/${{ matrix.label }}
          cmake -S src/main/cpp -B build/native -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=build/native
          cmake --build build/native --target install -j$(sysctl -n hw.ncpu)
          cp build/native/lib/${{ matrix.lib }} native/${{ matrix.label }}/
          echo "=== built ==="
          ls -la native/${{ matrix.label }}/
          file native/${{ matrix.label }}/${{ matrix.lib }}
      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.label }}
          path: native/${{ matrix.label }}/${{ matrix.lib }}
          retention-days: 1

  native-windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x86-64
            lib: bigmath_ffm.dll
            vcpkg_triplet: x64-windows
          - os: windows-11-arm
            label: windows-aarch64
            lib: bigmath_ffm.dll
            vcpkg_triplet: arm64-windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - shell: pwsh
        run: |
          vcpkg install --triplet ${{ matrix.vcpkg_triplet }}
          echo "CMAKE_PREFIX_PATH=$env:VCPKG_ROOT\installed\${{ matrix.vcpkg_triplet }}" >> $env:GITHUB_ENV
      - name: Build
        shell: pwsh
        run: |
          New-Item -Force -ItemType Directory -Path build/native, "native/${{ matrix.label }}"
          cmake -S src/main/cpp -B build/native -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=build/native
          cmake --build build/native --config Release --target install
          cp build/native/lib/${{ matrix.lib }} native/${{ matrix.label }}/
          echo "=== built ==="
          Get-ChildItem "native/${{ matrix.label }}"/
      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.label }}
          path: native/${{ matrix.label }}/${{ matrix.lib }}
          retention-days: 1

  native-android:
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            label: android-aarch64
            lib: libbigmath_ffm.so
          - abi: x86_64
            label: android-x86-64
            lib: libbigmath_ffm.so
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
      - name: Setup Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28
          add-to-path: false
      - name: Build
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          mkdir -p build/native native/${{ matrix.label }}
          cmake -S src/main/cpp -B build/native \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-21 \
            -DUSE_GMP=OFF
          cmake --build build/native --target bigmath_ffm -j$(nproc)
          find build/native -name "*.so" -exec cp {} native/${{ matrix.label }}/ \;
          echo "=== built ==="
          ls -la native/${{ matrix.label }}/
          file native/${{ matrix.label }}/${{ matrix.lib }}
      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.label }}
          path: native/${{ matrix.label }}/${{ matrix.lib }}
          retention-days: 1

  package:
    name: Package & Release
    needs: [native-linux, native-macos, native-windows, native-android]
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
      PUBLISH: ${{ !contains(github.event.head_commit.message, '[no-snapshot]') }}
      SNAPSHOT: true
      CI: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew
      - name: Download and organize native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: ./
          merge-multiple: true
      - name: Build JAR
        run: ./gradlew assemble -x test
      - name: Get Version
        id: ver
        run: echo "version=$(grep -oP 'mod_version\s*=\s*\K.*' gradle.properties | head -1)" >> $GITHUB_OUTPUT
      - run: echo "VERSION_SUFFIX=$(echo "${{ github.sha }}" | cut -c 1-7)" >> $GITHUB_ENV
      - name: Rename Jars
        if: env.PUBLISH == 'true'
        run: for file in build/libs/*; do mv "$file" "${file/-SNAPSHOT/-SNAPSHOT+$(date --utc '+%Y%m%d-%H%M%S')-${{ env.VERSION_SUFFIX }}}"; done;
      - name: Changelog
        id: changelog
        if: env.PUBLISH == 'true'
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          configuration: "./.github/json/config-latest.json"
          toTag: ${{ github.ref }}
          fetchViaCommits: true
          failOnError: false
      - name: Release Snapshot
        if: env.PUBLISH == 'true'
        uses: andelf/nightly-release@v1
        with:
          tag_name: latest
          name: '${{ steps.ver.outputs.version }}-SNAPSHOT+${{ env.VERSION_SUFFIX }}'
          prerelease: true
          body: |
            ## Bigmath-FFM Snapshot

            **${{ steps.ver.outputs.version }}-SNAPSHOT+${{ env.VERSION_SUFFIX }}** | `${{ github.sha }}`

            ${{ steps.changelog.outputs.changelog }}

            > [!WARNING]
            > Pre-release snapshot — not for production use.
          files: |
            build/libs/*.jar
            native/**/*

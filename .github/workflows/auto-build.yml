name: Snapshot Release

on:
  push:
    branches: ['main']
    paths: ['src/**', '*.gradle', 'gradle.properties', 'gradle/**', 'settings.gradle']

concurrency:
  group: snapshot-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86-64
            lib: libbigmath_ffm.so
          - os: ubuntu-24.04-arm
            label: linux-aarch64
            lib: libbigmath_ffm.so
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y libgmp-dev libmpfr-dev cmake
      - name: Build
        run: |
          mkdir -p build/native native/${{ matrix.label }}
          cmake -S src/main/cpp -B build/native -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=build/native
          cmake --build build/native --target install -j$(nproc)
          cp build/native/lib/* native/${{ matrix.label }}/
          echo "=== built ==="
          ls -la native/${{ matrix.label }}/
          file native/${{ matrix.label }}/${{ matrix.lib }}
      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.label }}
          path: native/
          retention-days: 1

  native-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macos-x86-64
            lib: libbigmath_ffm.dylib
          - os: macos-latest
            label: macos-aarch64
            lib: libbigmath_ffm.dylib
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: brew install gmp mpfr cmake
      - name: Build
        run: |
          mkdir -p build/native native/${{ matrix.label }}
          cmake -S src/main/cpp -B build/native -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=build/native
          cmake --build build/native --target install -j$(sysctl -n hw.ncpu)
          cp build/native/lib/* native/${{ matrix.label }}/
          echo "=== built ==="
          ls -la native/${{ matrix.label }}/
          file native/${{ matrix.label }}/${{ matrix.lib }}
      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.label }}
          path: native/
          retention-days: 1

  native-windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x86-64
            lib: bigmath_ffm.dll
            vcpkg_triplet: x64-mingw-dynamic
          - os: windows-11-arm
            label: windows-aarch64
            lib: bigmath_ffm.dll
            vcpkg_triplet: arm64-windows
    runs-on: ${{ matrix.os }}
    env:
      VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/.vcpkg-cache,readwrite"
    steps:
      - uses: actions/checkout@v4
      - name: Configure MSVC for Windows ARM64
        if: matrix.vcpkg_triplet == 'arm64-windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64_arm64
      - name: Configure MSVC compiler env
        if: matrix.vcpkg_triplet == 'arm64-windows'
        shell: pwsh
        run: |
          "CC=cl" >> $env:GITHUB_ENV
          "CXX=cl" >> $env:GITHUB_ENV
          "BIGMATH_WINDOWS_COMPILER=msvc" >> $env:GITHUB_ENV
      - name: Configure MinGW for Windows x64
        if: matrix.vcpkg_triplet == 'x64-mingw-dynamic'
        shell: pwsh
        run: |
          $gcc = (Get-Command gcc -ErrorAction Stop).Source
          $gxx = (Get-Command g++ -ErrorAction Stop).Source
          "CC=$gcc" >> $env:GITHUB_ENV
          "CXX=$gxx" >> $env:GITHUB_ENV
          "BIGMATH_WINDOWS_COMPILER=mingw" >> $env:GITHUB_ENV
      - id: vcpkg-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: .vcpkg-cache
          key: vcpkg-binary-${{ matrix.label }}-${{ hashFiles('vcpkg.json') }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            vcpkg-binary-${{ matrix.label }}-${{ hashFiles('vcpkg.json') }}-
      - shell: pwsh
        run: |
          vcpkg install --triplet ${{ matrix.vcpkg_triplet }}
          "BIGMATH_VCPKG_TRIPLET=${{ matrix.vcpkg_triplet }}" >> $env:GITHUB_ENV
      - name: Save vcpkg binary cache
        if: !cancelled()
        uses: actions/cache/save@v4
        with:
          path: .vcpkg-cache
          key: ${{ steps.vcpkg-cache-restore.outputs.cache-primary-key }}
      - name: Build
        shell: pwsh
        run: |
          New-Item -Force -ItemType Directory -Path build/native, "native/${{ matrix.label }}"
          cmake -S src/main/cpp -B build/native -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=build/native "-DCMAKE_PREFIX_PATH=${{ github.workspace }}/vcpkg_installed/${{ matrix.vcpkg_triplet }}"
          cmake --build build/native --target install
          Copy-Item build/native/lib/* "native/${{ matrix.label }}/" -Force
          echo "=== built ==="
          cmd /c "dir native\${{ matrix.label }}"
      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.label }}
          path: native/
          retention-days: 1

  native-android:
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            label: android-aarch64
            lib: libbigmath_ffm.so
          - abi: x86_64
            label: android-x86-64
            lib: libbigmath_ffm.so
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
      - name: Setup Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28
          add-to-path: false
      - name: Build
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          mkdir -p build/native native/${{ matrix.label }}
          cmake -S src/main/cpp -B build/native \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-21 \
            -DUSE_GMP=OFF
          cmake --build build/native --target bigmath_ffm -j$(nproc)
          find build/native -name "*.so" -exec cp {} native/${{ matrix.label }}/ \;
          echo "=== built ==="
          ls -la native/${{ matrix.label }}/
          file native/${{ matrix.label }}/${{ matrix.lib }}
      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.label }}
          path: native/
          retention-days: 1

  package:
    name: Package & Release
    needs: [native-linux, native-macos, native-windows, native-android]
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}
      PUBLISH: ${{ !contains(github.event.head_commit.message, '[no-snapshot]') }}
      SNAPSHOT: true
      CI: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: sudo apt-get update && sudo apt-get install -y libgmp-dev libmpfr-dev cmake
      - uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew
      - name: Download and organize native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: native/
          merge-multiple: true
      - name: Build JAR
        run: ./gradlew assemble -x test
      - name: Get Version
        id: ver
        run: echo "version=$(grep -oP 'mod_version\s*=\s*\K.*' gradle.properties | head -1)" >> $GITHUB_OUTPUT
      - run: echo "VERSION_SUFFIX=$(echo "${{ github.sha }}" | cut -c 1-7)" >> $GITHUB_ENV
      - name: Rename Jars
        if: env.PUBLISH == 'true'
        run: for file in build/libs/*-SNAPSHOT* bigmath-ffm-kt/build/libs/*-SNAPSHOT*; do [ -f "$file" ] && mv "$file" "${file/-SNAPSHOT/-SNAPSHOT+$(date --utc '+%Y%m%d-%H%M%S')-${{ env.VERSION_SUFFIX }}}"; done
      - name: Changelog
        id: changelog
        if: env.PUBLISH == 'true'
        uses: mikepenz/release-changelog-builder-action@v5
        with:
          configuration: "./.github/json/config-latest.json"
          toTag: ${{ github.ref }}
          fetchViaCommits: true
          failOnError: false
      - name: Release Snapshot
        if: env.PUBLISH == 'true'
        uses: andelf/nightly-release@v1
        with:
          tag_name: latest
          name: '${{ steps.ver.outputs.version }}-SNAPSHOT+${{ env.VERSION_SUFFIX }}'
          prerelease: true
          body: |
            ## Bigmath-FFM Snapshot

            **${{ steps.ver.outputs.version }}-SNAPSHOT+${{ env.VERSION_SUFFIX }}** | `${{ github.sha }}`

            ${{ steps.changelog.outputs.changelog }}

            > [!WARNING]
            > Pre-release snapshot — not for production use.
          files: |
            build/libs/*.jar
            bigmath-ffm-kt/build/libs/*.jar

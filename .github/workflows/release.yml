name: Release

on:
  release:
    types: [published]

jobs:
  native-full:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            label: linux-x86-64
          - os: ubuntu-24.04-arm
            arch: aarch64
            label: linux-aarch64
          - os: macos-14
            arch: x86_64
            label: macos-x86-64
          - os: macos-latest
            arch: aarch64
            label: macos-aarch64
          - os: windows-latest
            arch: x86_64
            label: windows-x86-64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Install Linux x86_64 deps
        if: runner.os == 'Linux' && matrix.arch == 'x86_64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgmp-dev libmpfr-dev cmake

      - name: Install Linux aarch64 deps
        if: runner.os == 'Linux' && matrix.arch == 'aarch64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgmp-dev libmpfr-dev cmake

      - name: Install macOS deps
        if: runner.os == 'macOS'
        run: |
          brew install gmp mpfr cmake

      - name: Install Windows deps
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg install --triplet x64-windows
          echo "CMAKE_PREFIX_PATH=$env:VCPKG_ROOT\installed\x64-windows" >> $env:GITHUB_ENV

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew
        shell: bash

      - name: Build
        run: ./gradlew build -x test -Dbigmath.native.classifier=${{ matrix.label }}
        shell: bash

      - name: Collect native artifacts
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.label }}
          find build/native/resources -type f -exec cp {} dist/${{ matrix.label }}/ \;

      - name: Upload platform artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.label }}/**

  android-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            target: aarch64-linux-android
            label: android-aarch64
          - abi: x86_64
            target: x86_64-linux-android
            label: android-x86-64

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r28
          add-to-path: false

      - name: Build native for Android
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          mkdir -p build/native
          cmake -S src/main/cpp -B build/native \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-21 \
            -DUSE_GMP=OFF
          cmake --build build/native --target bigmath_ffm -j$(nproc)
          mkdir -p dist/${{ matrix.label }}
          find build/native -name "*.so" -exec cp {} dist/${{ matrix.label }}/ \;

      - name: Upload Android artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.label }}/**

  publish-java:
    needs: [native-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          path: build/native/resources

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew
        shell: bash

      - name: Publish
        run: ./gradlew publish -x buildNative -x test
        shell: bash
        env:
          ORG_GRADLE_PROJECT_bigmath_skipNative: true

name: Release

on:
  release:
    types: [published]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm64
          - macos-latest
          - macos-latest-xlarge
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgmp-dev libmpfr-dev cmake

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install gmp mpfr cmake

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg install gmp mpfr --triplet x64-windows
          echo "CMAKE_PREFIX_PATH=$env:VCPKG_ROOT\installed\x64-windows" >> $env:GITHUB_ENV

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build -x test
        shell: bash

      - name: Collect native artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp -r build/native/resources/* dist/

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*

name: Feature Request
description: Request a new feature or enhancement.
labels: ["type: feature"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component does this feature relate to?
      options:
        - "BigInt"
        - "BigDecimal"
        - "Int128"
        - "FFM Bindings"
        - "Native (C++/CMake)"
        - "Build System"
        - "CI/CD"
        - "Documentation"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: Describe the feature you would like to see.
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Why is this feature needed? Provide example code if possible.
    validations:
      required: false

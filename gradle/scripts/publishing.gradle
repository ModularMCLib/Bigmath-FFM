publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
            pom {
                name = mod_name
                description = mod_description
                url = mod_url
                licenses {
                    license {
                        name = mod_license
                        url = 'https://www.gnu.org/licenses/lgpl-3.0.txt'
                    }
                }
                issueManagement {
                    system = 'GitHub'
                    url = mod_issue_tracker
                }
            }
        }
    }
}
